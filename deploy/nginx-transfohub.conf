# Nginx reverse proxy for TransfoHub
# Install: copy to /etc/nginx/sites-available/transfohub
#          ln -s /etc/nginx/sites-available/transfohub /etc/nginx/sites-enabled/
# Then: certbot --nginx -d your-domain.com
#
# Replace:
#   your-domain.com  → real hostname or server IP temporarily
#   /var/www/transfohub → app path on the server

upstream transfohub_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Uploads / static can be large (avatars)
    client_max_body_size 64m;

    location / {
        proxy_pass http://transfohub_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # Optional: serve Next static with long cache (after build)
    # location /_next/static/ {
    #     alias /var/www/transfohub/.next/static/;
    #     expires 365d;
    #     add_header Cache-Control "public, immutable";
    # }
}
